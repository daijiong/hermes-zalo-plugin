name: zalo-platform
label: Zalo
kind: platform
version: 1.0.0
description: >
  Zalo (personal account) gateway adapter for Hermes Agent.
  Bridges to a separate Node.js process running zca-js (unofficial Zalo
  personal API) over a localhost HTTP/SSE bridge. Receives Zalo messages
  (1-1 and group) and sends text, images, files, stickers, and voice back.
  Requires the companion hermes-zalo-bridge Node service to be running and
  logged in (via QR). NOTE: zca-js is an UNOFFICIAL API — use a secondary
  account; Zalo may rate-limit or lock automated accounts.
author: cuong
requires_env:
  - name: ZALO_BRIDGE_URL
    description: "Base URL of the running zca-js bridge (e.g. http://127.0.0.1:8787)"
    prompt: "Zalo bridge URL"
    password: false
optional_env:
  - name: ZALO_BRIDGE_TOKEN
    description: "Shared secret for the bridge (must match ZALO_BRIDGE_TOKEN on the bridge)"
    prompt: "Bridge token (optional)"
    password: true
  - name: ZALO_ALLOWED_USERS
    description: "Comma-separated Zalo user IDs (uidFrom) allowed to talk to the bot. EMPTY = allow everyone (Telegram-style)."
    prompt: "Allowed Zalo user IDs (comma-separated, blank = everyone)"
    password: false
  - name: ZALO_ALLOWED_THREADS
    description: "Comma-separated thread/group IDs the bot operates in. EMPTY = everywhere. Use to confine the bot to specific groups/DMs."
    prompt: "Allowed thread/group IDs (comma-separated, blank = everywhere)"
    password: false
  - name: ZALO_HOME_CHANNEL
    description: "Default thread for cron / notification delivery. Format: <threadId> or <threadType>:<threadId> (threadType=user|group)"
    prompt: "Home channel (threadId or type:threadId)"
    password: false
  - name: ZALO_GROUP_MODE
    description: "In groups, when the bot responds: 'mention' (only when @mentioned or replied-to, default), 'all' (every message in allowed groups), or 'off' (DM only)."
    prompt: "Group mode (mention/all/off)"
    password: false
  - name: ZALO_LOG_IDS
    description: "Log sender uid + threadId of every inbound message so you can discover IDs to add to allowlists. Default false."
    prompt: "Log inbound IDs? (true/false)"
    password: false
  - name: ZALO_CLIMSG_RETENTION_DAYS
    description: "Days to keep the undo cache (msgId→cliMsgId) on disk so message recall survives bridge restarts. 0 disables persistence (memory-only). Default 30. Used by the bridge process."
    prompt: "Undo-cache retention in days (default 30, 0 to disable)"
    password: false
  - name: ZALO_INFO_CACHE_TTL
    description: "Seconds to cache read-info results (getUserInfo/getGroupInfo/getAllGroups/getAllFriends) in the bridge, reducing repeat calls that risk rate-limiting. Default 600. Bridge-side env."
    prompt: "Info cache TTL in seconds (default 600)"
    password: false
  - name: ZALO_INFO_MIN_INTERVAL_MS
    description: "Minimum milliseconds between read-info calls to Zalo (rate limiter). On suspected rate-limit, the bridge backs off exponentially and serves stale cache. Default 1500. Bridge-side env."
    prompt: "Min interval between info calls in ms (default 1500)"
    password: false
  - name: ZALO_ALLOWED_ACTION_GROUPS
    description: "Comma-separated permission groups the agent may use, by danger level: read,send,interact,manage,destructive (or 'all'). Default: read,send,interact. 'destructive' (giải tán nhóm, xoá tin, block, đổi profile…) is OFF even under 'all' unless ZALO_ALLOW_DESTRUCTIVE=true."
    prompt: "Allowed action groups (read,send,interact,manage,destructive | all)"
    password: false
  - name: ZALO_ALLOW_DESTRUCTIVE
    description: "Allow the destructive group (disperseGroup, deleteMessage, deleteChat, removeFriend, blockUser, leaveGroup, changeGroupOwner, updateProfile…). VERY RISKY: anyone the bot listens to could trigger data loss. Default false."
    prompt: "Allow DESTRUCTIVE actions? (true/false)"
    password: false
  - name: ZALO_ALLOWED_ACTIONS
    description: "Custom allowlist: comma-separated zca-js method names to always permit regardless of group (e.g. disperseGroup,sendVideo). Overrides group gating."
    prompt: "Custom allowed actions (comma-separated, optional)"
    password: false
  - name: ZALO_DENIED_ACTIONS
    description: "Custom denylist: comma-separated zca-js method names to always block (highest precedence, beats everything)."
    prompt: "Custom denied actions (comma-separated, optional)"
    password: false
