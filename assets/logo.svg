<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" role="img" aria-label="hermes-zalo-plugin">
  <title>hermes-zalo-plugin</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B5CFF"/>
      <stop offset="1" stop-color="#00C2FF"/>
    </linearGradient>
  </defs>

  <!-- panel: own gradient so white text stays legible on light OR dark pages -->
  <rect x="0" y="0" width="880" height="200" rx="28" fill="url(#bg)"/>

  <!-- abstract messenger mark: chat bubble + winged "speed" lines (Hermes),
       deliberately original — not the Zalo brand logo -->
  <g transform="translate(52,48)">
    <rect x="0" y="0" width="108" height="84" rx="22" fill="#ffffff"/>
    <path d="M28 82 L28 110 L56 82 Z" fill="#ffffff"/>
    <g stroke="#0B5CFF" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M30 34 H86"/>
      <path d="M30 54 H70"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif">
    <text x="208" y="96" font-size="60" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Hermes <tspan fill="#BFE3FF">×</tspan> Zalo</text>
    <text x="210" y="140" font-size="25" font-weight="500" letter-spacing="0.3" fill="#DCEEFF">chat with your Hermes agent from Zalo</text>
  </g>
</svg>
